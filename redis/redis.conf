# Redis Configuration for Sound It Platform

# Network
bind 127.0.0.1
port 6379
protected-mode yes

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Logging
loglevel notice

# Security
# requirepass MUST be set via environment variable in production
# Example: requirepass ${REDIS_PASSWORD}
