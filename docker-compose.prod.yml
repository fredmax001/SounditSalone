# ============================================================
# Sound It Platform - Production Docker Compose
# ============================================================
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml logs -f
#   docker-compose -f docker-compose.prod.yml down
# ============================================================

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: soundit-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER must be set}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: ${DB_NAME:?DB_NAME must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"  # Only accessible locally
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-soundit_user} -d ${DB_NAME:-soundit_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soundit-network

  # Redis Cache & Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: soundit-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"  # Only accessible locally
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - soundit-network

  # Main Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soundit-app
    restart: always
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:?}:${DB_PASSWORD:?}@db:5432/${DB_NAME:?}
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:?}@redis:
      REDIS_RATE_LIMIT_URL: redis://:${REDIS_PASSWORD:?}
      
      # Application
      ENVIRONMENT: production
      DEBUG: "false"
      DEVELOPER_MODE: "false"
      SECRET_KEY: ${SECRET_KEY}
      BASE_URL: ${BASE_URL:-https://api.sounditsl.com}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS}
      
      # AWS S3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
      AWS_CLOUDFRONT_URL: ${AWS_CLOUDFRONT_URL}
      
      # Email
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      
      # SMS
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      TWILIO_VERIFY_SERVICE_SID: ${TWILIO_VERIFY_SERVICE_SID}
      
      # Payments
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
    expose:
      - "8000"
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/static/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - soundit-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: soundit-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/app/static:ro
    depends_on:
      - app
    networks:
      - soundit-network

  # Celery Worker (for background tasks)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soundit-worker
    restart: always
    command: celery -A tasks worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://${DB_USER:?}:${DB_PASSWORD:?}@db:
      REDIS_URL: redis://:${REDIS_PASSWORD:?}@redis:
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    depends_on:
      - db
      - redis
    networks:
      - soundit-network

  # Celery Beat (for scheduled tasks)
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soundit-beat
    restart: always
    command: celery -A tasks beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://${DB_USER:?}:${DB_PASSWORD:?}@db:5432/${DB_NAME:?}
      REDIS_URL: redis://:${REDIS_PASSWORD:?}
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - db
      - redis
    networks:
      - soundit-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
  static_files:
    driver: local

networks:
  soundit-network:
    driver: bridge
